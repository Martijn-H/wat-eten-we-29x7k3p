name: Refresh recipes

on:
  # Weekly auto-refresh: Monday 06:30 UTC (≈ 07:30/08:30 Brussels)
  schedule:
    - cron: "30 6 * * 1"
  # Manual trigger from the "Actions" tab or via the in-page ↻ link
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-recipes
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Scrape sources
        run: npm run scrape

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/recipes.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh recipes ($(date -u +%Y-%m-%d))"
            git push
          fi
